apiVersion: v1
kind: ConfigMap
metadata:
  name: datacenter-app-config
  namespace: datacenter-mapping
data:
  application.yml: |
    server:
      port: 8443
      ssl:
        enabled: true
        key-store: /etc/secrets/keystore.p12
        key-store-password: ${SSL_KEYSTORE_PASSWORD}
        key-store-type: PKCS12
        key-alias: tomcat
      http2:
        enabled: true
      compression:
        enabled: true
        min-response-size: 1024
      tomcat:
        threads:
          max: 200
          min-spare: 10
        accept-count: 100
        max-connections: 10000

    spring:
      application:
        name: datacenter-mapping
      redis:
        host: redis-service.datacenter-mapping.svc.cluster.local
        port: 6379
        timeout: 2000
        jedis:
          pool:
            max-active: 20
            max-idle: 10
            min-idle: 5
      jackson:
        serialization:
          write-dates-as-timestamps: false
      servlet:
        multipart:
          max-file-size: 10MB
          max-request-size: 10MB

    logging:
      level:
        root: INFO
        com.datacenter: INFO
      pattern:
        console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"