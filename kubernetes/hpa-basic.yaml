# Fallback HPA Configuration for Initial Deployments
# Use this configuration if Prometheus and custom metrics API are not available.
# This HPA scales based on CPU and memory utilization only.
#
# To use this configuration instead of hpa.yaml:
#   kubectl delete hpa datacenter-app-hpa -n datacenter-mapping
#   kubectl apply -f kubernetes/hpa-basic.yaml
#
# Once Prometheus is set up, switch back to hpa.yaml:
#   kubectl delete hpa datacenter-app-hpa-basic -n datacenter-mapping
#   kubectl apply -f kubernetes/hpa.yaml

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: datacenter-app-hpa-basic
  namespace: datacenter-mapping
  annotations:
    description: "Basic HPA without custom metrics. Use this for initial deployments. Switch to hpa.yaml once Prometheus is configured."
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: datacenter-app
  minReplicas: 3
  maxReplicas: 20
  metrics:
  # CPU-based scaling: scale up when CPU usage exceeds 70%
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  # Memory-based scaling: scale up when memory usage exceeds 80%
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
      - type: Pods
        value: 2
        periodSeconds: 60
      selectPolicy: Min
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
      - type: Pods
        value: 4
        periodSeconds: 30
      selectPolicy: Max