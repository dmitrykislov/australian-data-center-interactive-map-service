services:
  redis:
    image: redis:7-alpine
    container_name: datacenter-redis
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: datacenter-app
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      SPRING_PROFILES_ACTIVE: test
      SERVER_SSL_ENABLED: "false"
      SERVER_PORT: "8080"
    ports:
      - "8080:8080"
    entrypoint:
      - java
      - -XX:+UseG1GC
      - -XX:MaxRAMPercentage=75.0
      - -jar
      - /app/app.jar
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

volumes:
  redis-data:
